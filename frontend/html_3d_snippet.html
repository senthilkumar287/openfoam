<!-- ADD this section to index.html in the Mesh panel -->

<div class="form-group">
    <label>Dimension</label>
    <select id="mesh-dimension">
        <option value="2d">2D (nz=1)</option>
        <option value="3d">3D</option>
    </select>
</div>

<div id="nz-group" style="display:none;">
    <div class="form-group">
        <label>Grid Size Z</label>
        <input type="number" id="mesh-nz" value="10" min="1" max="100">
    </div>
    <div class="form-group">
        <label>Domain Length Z (m)</label>
        <input type="number" id="domain-z" value="0.2" min="0.01" max="10" step="0.1">
    </div>
</div>

<!-- ADD this to visualization section -->
<div id="viz-3d-section" style="display:none;">
    <h3>3D Visualization Controls</h3>
    <div class="form-group">
        <label>Slice Axis</label>
        <select id="slice-axis">
            <option value="z">XY Plane (Z)</option>
            <option value="x">YZ Plane (X)</option>
            <option value="y">XZ Plane (Y)</option>
        </select>
    </div>
    <div class="form-group">
        <label>Slice Index</label>
        <input type="range" id="slice-index" min="0" max="10" value="5">
        <span id="slice-value">5</span>
    </div>
    <button class="btn-primary" onclick="render3DHeatmap()">Render 3D</button>
</div>

<div id="canvas-3d" style="width:100%; height:500px; border:1px solid #ccc; margin-top:10px; display:none;"></div>
